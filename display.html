<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎡 Vòng Quay May Mắn – Màn Hình Hội Trường</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════
       VARIABLES & RESET
    ══════════════════════════════════════════════ */
    :root {
      --gold:   #FFD700;
      --gold2:  #FFA500;
      --gold3:  #ffec6e;
      --red:    #E63946;
      --green:  #2DC653;
      --blue:   #0077B6;
      --dark:   #050510;
      --dark2:  #0a0a1f;
      --dark3:  #12122a;
      --dark4:  #1a1a38;
      --text:   #F0F0FF;
      --text2:  #9090c0;
      --border: rgba(255,215,0,0.2);
      --glow:   0 0 40px rgba(255,215,0,0.35);
      --glow2:  0 0 80px rgba(255,165,0,0.2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      font-family: 'Barlow Condensed', 'Segoe UI', sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow: hidden;
      user-select: none;
    }

    /* ══════════════════════════════════════════════
       STARFIELD BACKGROUND
    ══════════════════════════════════════════════ */
    #starfield {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(123,47,190,.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(0,80,180,.18) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(255,165,0,.05) 0%, transparent 70%);
    }
    #starfield canvas { position: absolute; inset: 0; }

    /* ══════════════════════════════════════════════
       SCREENS
    ══════════════════════════════════════════════ */
    .screen { display: none; position: relative; z-index: 1; width: 100%; height: 100%; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════════════════
       WELCOME SCREEN
    ══════════════════════════════════════════════ */
    #screen-welcome {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .welcome-top {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; margin-bottom: 52px;
    }

    .welcome-icon {
      font-size: 120px;
      line-height: 1;
      filter: drop-shadow(0 0 40px rgba(255,215,0,.7));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-18px) rotate(3deg); }
    }

    .welcome-title {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(3.5rem, 8vw, 7rem);
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 0%, var(--gold) 40%, var(--gold2) 70%, #ff6b00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(255,165,0,.5));
      line-height: 1.05;
      text-align: center;
    }

    .welcome-subtitle {
      font-size: clamp(1.1rem, 2.5vw, 1.8rem);
      color: var(--text2);
      letter-spacing: 6px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .welcome-divider {
      width: 200px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 8px 0;
    }

    /* Decorative spinning rings */
    .rings-wrap {
      position: absolute;
      width: 600px; height: 600px;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: -1;
    }
    .ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(255,215,0,.12);
    }
    .ring-1 { inset: 0; animation: spin-slow 20s linear infinite; }
    .ring-2 { inset: 40px; animation: spin-slow 15s linear infinite reverse; border-color: rgba(255,165,0,.08); }
    .ring-3 { inset: 90px; animation: spin-slow 25s linear infinite; border-color: rgba(255,100,0,.06); }
    @keyframes spin-slow { to { transform: rotate(360deg); } }

    /* Enter button */
    .btn-enter {
      position: relative;
      padding: 22px 70px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #000;
      background: linear-gradient(135deg, var(--gold3), var(--gold), var(--gold2));
      border: none;
      border-radius: 6px;
      cursor: pointer;
      overflow: hidden;
      transition: all .25s;
      box-shadow: 0 0 40px rgba(255,165,0,.5), 0 8px 32px rgba(0,0,0,.4);
    }
    .btn-enter::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.4), transparent 60%);
      opacity: 0; transition: opacity .25s;
    }
    .btn-enter:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 0 60px rgba(255,165,0,.7), 0 16px 48px rgba(0,0,0,.4); }
    .btn-enter:hover::before { opacity: 1; }
    .btn-enter:active { transform: scale(.97); }

    /* Corner decorations */
    .corner { position: absolute; width: 60px; height: 60px; }
    .corner-tl { top: 20px; left: 20px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); opacity: .4; }
    .corner-tr { top: 20px; right: 20px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); opacity: .4; }
    .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); opacity: .4; }
    .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); opacity: .4; }

    /* ══════════════════════════════════════════════
       DISPLAY SCREEN (TV layout)
    ══════════════════════════════════════════════ */
    #screen-display {
      flex-direction: column;
    }

    /* Header bar */
    .d-header {
      display: flex; align-items: center;
      padding: 0 28px;
      height: 64px; min-height: 64px;
      background: rgba(0,0,0,.6);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      gap: 16px;
      flex-shrink: 0;
      z-index: 10;
    }
    .d-header-title {
      font-family: 'Oswald', sans-serif;
      font-size: 1.45rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--gold3), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex: 1;
    }
    .d-rt-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #444; flex-shrink: 0;
      transition: all .4s;
    }
    .d-rt-dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .d-rt-lbl { font-size: .8rem; color: var(--text2); letter-spacing: 1px; }

    .btn-exit {
      padding: 8px 22px;
      font-family: 'Oswald', sans-serif;
      font-size: .95rem; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #E63946, #9d0208);
      border: none; border-radius: 5px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(230,57,70,.4);
      transition: all .2s;
      flex-shrink: 0;
    }
    .btn-exit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(230,57,70,.5); }
    .btn-exit:active { transform: scale(.96); }

    /* Main layout: LEFT wheel | RIGHT scoreboard */
    .d-body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 420px;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .d-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 24px;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    /* Glow backdrop for wheel */
    .d-left::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,165,0,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Current player banner */
    .current-player-banner {
      display: flex; align-items: center; gap: 14px;
      background: rgba(0,0,0,.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 24px;
      width: 100%; max-width: 560px;
    }
    .cp-label {
      font-size: .8rem; color: var(--text2);
      letter-spacing: 2px; text-transform: uppercase;
      font-weight: 600;
    }
    .cp-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-weight: 700; font-size: 1.1rem;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(0,0,0,.5);
    }
    .cp-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.8rem; font-weight: 700;
      letter-spacing: 2px;
      color: var(--gold);
      flex: 1;
      text-shadow: 0 0 20px rgba(255,215,0,.4);
    }
    .cp-turns {
      font-size: 1rem; color: var(--text2);
      letter-spacing: 1px;
    }
    .cp-turns span { color: var(--gold2); font-weight: 700; font-size: 1.2rem; }

    /* Wheel */
    .wheel-stage {
      position: relative;
      width: min(420px, 55vh);
      height: min(420px, 55vh);
      flex-shrink: 0;
    }
    .wheel-glow {
      position: absolute; inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,165,0,.15) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { opacity: .6; transform: scale(1); }
      50%      { opacity: 1; transform: scale(1.05); }
    }
    .wheel-img {
      width: 100%; height: 100%;
      object-fit: contain; border-radius: 50%;
      box-shadow: 0 0 60px rgba(255,215,0,.25), 0 0 120px rgba(255,165,0,.1);
    }
    .wheel-ptr {
      position: absolute;
      top: -22px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 38px solid var(--gold);
      filter: drop-shadow(0 0 10px rgba(255,215,0,.9));
      z-index: 10;
    }

    /* Result box */
    .result-display {
      width: 100%; max-width: 560px;
      background: rgba(0,0,0,.55);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 24px;
      display: flex; align-items: center;
      gap: 16px;
    }
    .result-label {
      font-size: .75rem; color: var(--text2);
      letter-spacing: 2px; text-transform: uppercase;
      font-weight: 600; flex-shrink: 0;
    }
    .result-value {
      font-family: 'Oswald', sans-serif;
      font-size: 2.4rem; font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(255,215,0,.6);
      flex: 1; text-align: center;
      transition: all .3s;
    }
    .result-value.highlight {
      animation: result-pop .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes result-pop {
      0%   { transform: scale(.8); opacity: 0; }
      100% { transform: scale(1);  opacity: 1; }
    }

    /* Question panel */
    .q-display {
      width: 100%; max-width: 620px;
      background: rgba(0,0,0,.6);
      border: 1px solid rgba(255,215,0,.3);
      border-radius: 10px;
      padding: 18px 24px;
      display: none;
    }
    .q-display.show { display: block; animation: slide-up .35s ease; }
    @keyframes slide-up {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .q-display-hdr {
      font-size: .72rem; color: var(--gold);
      letter-spacing: 2px; text-transform: uppercase;
      font-weight: 700; margin-bottom: 10px;
    }
    .q-display-text {
      font-size: 1.3rem; font-weight: 600;
      line-height: 1.5; color: var(--text);
      margin-bottom: 12px;
    }
    .q-timer-bar {
      width: 100%; height: 5px;
      background: rgba(255,255,255,.1);
      border-radius: 3px; overflow: hidden;
    }
    .q-timer-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--gold));
      border-radius: 3px;
      transition: width 1s linear;
    }
    .q-opts-display {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-top: 12px;
    }
    .q-opt-display {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 6px; padding: 9px 14px;
      font-size: 1rem; font-weight: 600;
      letter-spacing: .5px; color: var(--text);
      transition: all .3s;
    }
    .q-opt-display.correct {
      background: rgba(45,198,83,.2) !important;
      border-color: var(--green) !important;
      color: #7fff9f;
      box-shadow: 0 0 20px rgba(45,198,83,.3);
    }

    /* ── RIGHT PANEL ── */
    .d-right {
      background: rgba(0,0,0,.35);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 18px 16px;
      gap: 12px;
      overflow: hidden;
    }

    .d-right-title {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--text2); text-align: center;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* Player cards */
    .player-cards { 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      flex: 1; 
      overflow-y: auto;
      padding-right: 5px;
    }

    .p-card-tv {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      transition: all .4s;
      position: relative; overflow: hidden;
    }
    .p-card-tv::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0), transparent);
      transition: all .4s;
    }
    .p-card-tv.active-tv {
      border-color: var(--gold);
      background: rgba(255,215,0,.08);
      box-shadow: 0 0 20px rgba(255,215,0,.15), inset 0 0 20px rgba(255,215,0,.04);
    }
    .p-card-tv.active-tv::before {
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .p-card-tv.out-tv { 
      opacity: .5; 
      filter: grayscale(0.5);
    }
    .p-card-tv.out-tv .p-score-tv {
      opacity: 0.7;
    }
    .p-card-tv.offline-tv { 
      opacity: .25; 
    }

    /* Rank badge */
    .p-rank {
      font-family: 'Oswald', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      width: 36px; text-align: center;
      color: var(--text2); flex-shrink: 0;
    }
    .p-rank.r1 { color: #FFD700; text-shadow: 0 0 12px rgba(255,215,0,.6); }
    .p-rank.r2 { color: #C0C0C0; }
    .p-rank.r3 { color: #CD7F32; }

    .p-av-tv {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-weight: 700; font-size: 1rem;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
    }
    .p-info-tv { flex: 1; min-width: 0; }
    .p-name-tv {
      font-family: 'Oswald', sans-serif;
      font-size: 1.15rem; font-weight: 700;
      letter-spacing: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text);
    }
    .p-card-tv.active-tv .p-name-tv { color: var(--gold); }
    .p-turns-tv {
      font-size: .78rem; color: var(--text2);
      letter-spacing: .5px; margin-top: 1px;
    }
    .p-turns-tv span {
      color: var(--gold2);
      font-weight: 600;
    }
    .p-score-tv {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem; font-weight: 700;
      color: var(--gold);
      text-align: right; flex-shrink: 0;
      text-shadow: 0 0 16px rgba(255,215,0,.4);
      transition: all .4s;
    }
    .p-score-tv.bump {
      animation: score-bump .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes score-bump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.35); color: #fff; text-shadow: 0 0 30px rgba(255,215,0,.8); }
      100% { transform: scale(1); }
    }

    /* Status bar at bottom */
    .d-status {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: auto;
    }
    .d-status-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: .75rem; color: var(--text2);
      letter-spacing: 1px;
    }
    .status-phase {
      display: flex; align-items: center; gap: 6px;
    }
    .phase-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text2);
      transition: all .3s;
    }
    .phase-dot.spinning { background: var(--gold); box-shadow: 0 0 8px var(--gold); animation: blink .6s ease-in-out infinite; }
    .phase-dot.answering { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
    .phase-dot.idle { background: var(--green); box-shadow: 0 0 8px var(--green); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Player eliminated badge */
    .eliminated-badge {
      font-size: .7rem;
      background: rgba(230,57,70,.2);
      border: 1px solid rgba(230,57,70,.4);
      border-radius: 4px;
      padding: 2px 6px;
      margin-left: 8px;
      color: #ff8a92;
    }

    /* Avatar colors */
    .av1{background:linear-gradient(135deg,#E63946,#9d0208)}
    .av2{background:linear-gradient(135deg,#0077B6,#023e8a)}
    .av3{background:linear-gradient(135deg,#2DC653,#1d8a38)}
    .av4{background:linear-gradient(135deg,#FF9F1C,#e07000)}
    .av5{background:linear-gradient(135deg,#7B2FBE,#5a189a)}
    .av6{background:linear-gradient(135deg,#FF4D8D,#c9184a)}

    /* ── GAME OVER OVERLAY ── */
    .go-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 500;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      backdrop-filter: blur(12px);
    }
    .go-overlay.show { display: flex; animation: fade-in .5s ease; }
    @keyframes fade-in { from{opacity:0} to{opacity:1} }

    .go-title {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(3rem, 7vw, 6rem);
      font-weight: 700; letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--gold3), var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,165,0,.5));
    }
    .go-winner-box {
      background: var(--dark3);
      border: 2px solid var(--gold);
      border-radius: 16px;
      padding: 36px 60px;
      text-align: center;
      box-shadow: 0 0 60px rgba(255,215,0,.3), 0 0 120px rgba(255,165,0,.15);
    }
    .go-crown { font-size: 72px; line-height: 1; animation: float 2.5s ease-in-out infinite; }
    .go-winner-name {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700; color: var(--gold);
      letter-spacing: 3px; margin: 8px 0;
      text-shadow: 0 0 30px rgba(255,215,0,.5);
    }
    .go-winner-score {
      font-size: 1.6rem; color: var(--text2);
      letter-spacing: 2px;
    }
    .go-winner-score span { color: var(--gold2); font-weight: 700; font-size: 2rem; }

    .go-ranking {
      display: flex; gap: 14px; flex-wrap: wrap;
      justify-content: center;
    }
    .go-rank-item {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 14px 24px; text-align: center;
      min-width: 100px;
    }
    .go-rank-pos { font-size: 1.6rem; margin-bottom: 4px; }
    .go-rank-name { font-size: .9rem; color: var(--text2); margin-bottom: 4px; font-weight: 600; }
    .go-rank-score {
      font-family: 'Oswald', sans-serif;
      font-size: 1.8rem; font-weight: 700; color: var(--gold);
    }

    /* ── TOAST ── */
    .tv-toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: rgba(20,20,40,.95);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 12px 28px;
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: 1px;
      z-index: 999;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
      box-shadow: 0 12px 40px rgba(0,0,0,.5), var(--glow);
    }
    .tv-toast.show { transform: translateX(-50%) translateY(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Progress info */
    .progress-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 5px;
      font-size: 0.85rem;
    }
    .players-left {
      color: var(--green);
      font-weight: 700;
    }
    .eliminated-count {
      color: var(--red);
      opacity: 0.8;
    }
  </style>
</head>

  <div class="go-ranking" id="go-ranking"></div>
</div>

<div class="tv-toast" id="tv-toast"></div>

<script src="question.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════
   DISPLAY APP – MÀN HÌNH HỘI TRƯỜNG
   Theo dõi toàn bộ diễn biến game, hiển thị rõ người đã hết lượt
══════════════════════════════════════════════════════════════ */
const db      = window.supabase.createClient(supabaseUrl, supabaseKey);
const AVCLASS = ['av1','av2','av3','av4','av5','av6'];
const rl = r => ({'20':'🎯 20 Điểm','40':'⭐ 40 Điểm','Nhân đôi':'✖️2 Nhân Đôi','Chia hai':'➗2 Chia Hai','Thêm lượt':'➕ Thêm Lượt','Mất lượt':'❌ Mất Lượt'}[r]||r);

/* ── STATE ── */
let gsState     = {};
let playersData = {};
let wheelDeg    = 0;
let lastSpinCnt = -1;
let lastQId     = -1;
let pendingResult = '';
let wheelSpinning = false;
let qTimerInt   = null;
let prevScores  = {};
let gameOverShown = false;
let answerRevealQId = -1; // theo dõi câu hỏi đang reveal đáp án

let _chGS = null, _chPl = null, _pollId = null;

/* ── AUDIO ────────────────────────────────────────────────── */
let spinAudio = null;
function getSpinAudio(){
  if(!spinAudio){
    spinAudio = new Audio('audio.mp3');
    spinAudio.preload = 'auto';
  }
  return spinAudio;
}

/* ── HELPERS ── */
const $ = id => document.getElementById(id);
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); }
function showToast(msg, dur=3000){ const t=$('tv-toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),dur); }
function setRT(ok){ $('d-rt-dot').className='d-rt-dot'+(ok?' ok':''); $('d-rt-lbl').textContent=ok?'🟢 Realtime':'🟡 Polling'; }

/* ══ STARFIELD ══ */
(function initStars(){
  const c = $('star-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  function mkStar(){ return { x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*.8+.2, a:Math.random(), da:(.002+Math.random()*.004)*(Math.random()<.5?1:-1) }; }
  function init(){ resize(); stars=[]; for(let i=0;i<180;i++) stars.push(mkStar()); }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a=Math.max(0,Math.min(1,s.a+s.da));
      if(s.a<=0||s.a>=1) s.da*=-1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a*0.7})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init);
  init(); draw();
})();

/* ══════════════════════════════════
   ENTER / EXIT
══════════════════════════════════ */
function enterDisplay(){
  showScreen('screen-display');
  startListeners();
}

function exitDisplay(){
  // Dừng realtime
  if(_chGS) db.removeChannel(_chGS);
  if(_chPl) db.removeChannel(_chPl);
  clearInterval(_pollId);
  clearInterval(qTimerInt);
  _chGS=null; _chPl=null;

  // Dừng âm thanh nếu đang phát
  if(spinAudio){
    spinAudio.pause();
    spinAudio.currentTime = 0;
  }

  // Reset state
  gsState={}; playersData={}; wheelDeg=0;
  lastSpinCnt=-1; lastQId=-1; prevScores={}; pendingResult=''; wheelSpinning=false;
  gameOverShown=false; answerRevealQId=-1;

  // Ẩn overlay
  $('go-overlay').classList.remove('show');
  $('tv-q-panel').classList.remove('show');

  // Reset wheel rotation
  const img = $('tv-wheel');
  if(img){
    img.style.transition = 'none';
    img.style.transform = 'rotate(0deg)';
  }

  // Về màn hình chào
  showScreen('screen-welcome');
}

/* ══════════════════════════════════
   REALTIME
══════════════════════════════════ */
function startListeners(){
  if(_chGS) db.removeChannel(_chGS);
  if(_chPl) db.removeChannel(_chPl);
  clearInterval(_pollId);

  _chGS = db.channel('tv-gs-'+Date.now())
    .on('postgres_changes',{event:'*',schema:'public',table:'game_state',filter:'id=eq.1'},
      p=>{ if(p.new) applyGS(p.new); })
    .subscribe(s=>{ if(s==='SUBSCRIBED') setRT(true); else if(s==='CHANNEL_ERROR') setRT(false); });

  _chPl = db.channel('tv-pl-'+Date.now())
    .on('postgres_changes',{event:'*',schema:'public',table:'players'},
      p=>{ if(p.new) applyPlayer(p.new); })
    .subscribe();

  syncFromDB();
  _pollId = setInterval(syncFromDB, 3500);
}

async function syncFromDB(){
  try{
    const [{data:pd},{data:gsd}] = await Promise.all([
      db.from('players').select('*'),
      db.from('game_state').select('*').eq('id',1).single()
    ]);
    if(pd) pd.forEach(p=>applyPlayer(p));
    if(gsd) applyGS(gsd);
  }catch(e){ console.error('[TV] Sync error:',e); }
}

/* ══════════════════════════════════
   APPLY PLAYER
══════════════════════════════════ */
function applyPlayer(p){
  if(!p) return;
  const prev = playersData[p.id];
  playersData[p.id] = p;
  // Phát hiện điểm thay đổi
  if(prev && p.score !== prev.score) prevScores[p.id] = prev.score;
  renderScoreboard();
  updateProgressInfo();
}

/* ══════════════════════════════════
   CẬP NHẬT THÔNG TIN TIẾN ĐỘ
══════════════════════════════════ */
function updateProgressInfo() {
  const n = gsState.total_players || 0;
  if(n === 0) {
    $('players-left').textContent = '';
    $('eliminated-count').textContent = '';
    return;
  }

  let playersLeft = 0;
  let playersLeftNames = [];
  let eliminatedCount = 0;

  for(let i = 1; i <= n; i++) {
    const p = playersData[i];
    if(p?.name) {
      const turns = p.turns_left || 0;
      if(turns > 0) {
        playersLeft++;
        playersLeftNames.push(p.name);
      } else {
        eliminatedCount++;
      }
    }
  }

  if(playersLeft > 0) {
    $('players-left').textContent = `👥 Còn ${playersLeft} người: ${playersLeftNames.join(', ')}`;
  } else {
    $('players-left').textContent = '';
  }

  if(eliminatedCount > 0) {
    $('eliminated-count').textContent = `❌ ${eliminatedCount} người đã hết lượt`;
  } else {
    $('eliminated-count').textContent = '';
  }
}

/* ══════════════════════════════════════════════════════════════
   APPLY GAME STATE
══════════════════════════════════════════════════════════════ */
function applyGS(gs){
  if(!gs) return;

  const oldGs = {...gsState};
  gsState = gs;

  // Header player info
  updateCurrentPlayer();

  // ── ANIMATION QUAY + ÂM THANH ──
  const cnt = gs.spin_counter || 0;
  if(gs.spinning && cnt !== lastSpinCnt){
    lastSpinCnt = cnt;
    animateWheel(gs.spin_angle);
    // Phát âm thanh vòng quay
    try{
      const audio = getSpinAudio();
      audio.currentTime = 0;
      audio.play().catch(()=>{});
      // Dừng audio khi vòng quay kết thúc
      setTimeout(()=>{
        audio.pause();
        audio.currentTime = 0;
      }, 7100);
    }catch(e){}
    updatePhase('spinning');
  }

  // ── KẾT QUẢ – lưu vào buffer, chỉ hiển thị sau khi animation kết thúc ──
  if(gs.spin_result && gs.spin_result !== pendingResult && pendingResult === '') {
    // Luôn buffer kết quả nếu chưa có
    pendingResult = gs.spin_result;
  }
  // Chỉ hiển thị từ polling khi wheel THỰC SỰ đã dừng (cả DB lẫn animation)
  if(!gs.spinning && !wheelSpinning && pendingResult){
    const rv = $('tv-result');
    if(rv.dataset.shown !== pendingResult){
      rv.dataset.shown = pendingResult;
      rv.textContent = rl(pendingResult);
      rv.classList.remove('highlight');
      void rv.offsetWidth;
      rv.classList.add('highlight');
      if(pendingResult === 'Thêm lượt') showToast('➕ Thêm lượt!', 2000);
      else if(pendingResult === 'Mất lượt') showToast('❌ Mất lượt!', 2000);
      pendingResult = '';
    }
  } else if(!gs.spinning && !wheelSpinning && !gs.spin_result){
    const rv = $('tv-result');
    if(rv.dataset.shown !== '') {
      rv.textContent = '–';
      rv.dataset.shown = '';
    }
  }

  // ── CÂU HỎI ──
  if(gs.waiting_answer && gs.question_id > 0 && gs.question_id !== lastQId){
    lastQId = gs.question_id;
    answerRevealQId = -1;
    showTVQuestion(gs.question_id);
    updatePhase('answering');
  }

  // ── ĐÁP ÁN VÀ KẾT QUẢ – hiện đáp án đúng, sau đó mới ẩn ──
  if(gs.answer_result && !gs.waiting_answer && gs.question_id > 0 
     && gs.question_id === lastQId && gs.question_id !== answerRevealQId){
    answerRevealQId = gs.question_id;
    revealAnswer(gs.question_id, gs.answer_result);
    // Ẩn câu hỏi sau 2.5 giây (đủ thời gian xem đáp án)
    setTimeout(()=>{
      $('tv-q-panel').classList.remove('show');
      clearInterval(qTimerInt);
      lastQId = -1;
      answerRevealQId = -1;
    }, 2500);
    updatePhase('idle');
  }

  // ── ẨN CÂU HỎI khi không có answer_result và không waiting ──
  if(!gs.waiting_answer && !gs.spinning && !gs.answer_result && lastQId > 0 && answerRevealQId === -1){
    setTimeout(()=>{
      if(lastQId > 0 && answerRevealQId === -1) { // double check
        $('tv-q-panel').classList.remove('show');
        clearInterval(qTimerInt);
        lastQId = -1;
      }
    }, 600);
    updatePhase('idle');
  }

  // ── GAME OVER ──
  if(gs.host_phase === 'gameover' && !gameOverShown){
    gameOverShown = true;
    // Fetch data mới nhất rồi mới render kết quả
    syncPlayersAndShowGameOver();
  }

  // Phase indicator
  if(gs.spinning) updatePhase('spinning');
  else if(gs.waiting_answer) updatePhase('answering');
  else if(gs.started) updatePhase('idle');
  else updatePhase('wait');

  // Progress
  if(gs.started){
    const n = gs.total_players || 0;
    let left = 0;
    for(let i=1;i<=n;i++) left += (playersData[i]?.turns_left||0);
    $('game-progress').textContent = `${left} lượt còn lại`;
  } else {
    $('game-progress').textContent = gs.started===false && gs.host_phase!=='gameover' ? 'Chờ bắt đầu' : '';
  }

  renderScoreboard();
  updateProgressInfo();
}

/* ══════════════════════════════════
   UPDATE CURRENT PLAYER BANNER
══════════════════════════════════ */
function updateCurrentPlayer(){
  const gs = gsState;
  if(!gs.started || !gs.current_player){ 
    $('cp-name').textContent = 'Chờ bắt đầu...';
    $('cp-avatar').textContent = '?';
    $('cp-avatar').className = 'cp-avatar';
    $('cp-turns').textContent = '–';
    return;
  }
  const p = playersData[gs.current_player];
  const av = $('cp-avatar');
  av.className = `cp-avatar ${AVCLASS[gs.current_player-1]||''}`;
  av.textContent = gs.current_player;
  $('cp-name').textContent = p?.name || `Người ${gs.current_player}`;
  $('cp-turns').textContent = p?.turns_left ?? '–';
}

/* ══════════════════════════════════
   ANIMATE WHEEL
══════════════════════════════════ */
function animateWheel(targetAngle){
  const img = $('tv-wheel');
  const base = Math.ceil(wheelDeg/360)*360 || 0;
  const total = base + 5*360 + (targetAngle % 360);
  wheelDeg = total;
  wheelSpinning = true;

  let spinDone = false;
  function doAfterSpin(){
    if(spinDone) return;
    spinDone = true;
    img.removeEventListener('transitionend', onSpinEnd);
    clearTimeout(spinFallback);
    wheelSpinning = false;
    if(pendingResult){
      const rv = $('tv-result');
      rv.dataset.shown = pendingResult;
      rv.textContent = rl(pendingResult);
      rv.classList.remove('highlight');
      void rv.offsetWidth;
      rv.classList.add('highlight');
      if(pendingResult === 'Thêm lượt') showToast('➕ Thêm lượt!', 2000);
      else if(pendingResult === 'Mất lượt') showToast('❌ Mất lượt!', 2000);
      pendingResult = '';
    }
  }

  function onSpinEnd(e){
    if(e.propertyName !== 'transform') return;
    doAfterSpin();
  }
  img.addEventListener('transitionend', onSpinEnd);

  // Fallback nếu transitionend không kích hoạt
  const spinFallback = setTimeout(doAfterSpin, 8500);

  img.style.transition = 'transform 7s cubic-bezier(.05,.9,.1,1)';
  img.style.transform  = `rotate(${total}deg)`;
}

/* ══════════════════════════════════
   SHOW QUESTION ON TV
══════════════════════════════════ */
function showTVQuestion(qId){
  const q = (typeof questions!=='undefined') ? questions.find(q=>q.id===qId) : null;

  clearInterval(qTimerInt);
  const panel = $('tv-q-panel');
  panel.classList.add('show');

  if(q){
    $('tv-q-text').textContent = q.text;
    const opts = $('tv-q-opts');
    opts.innerHTML = '';
    q.options.forEach(opt=>{
      const d = document.createElement('div');
      d.className = 'q-opt-display';
      d.textContent = opt;
      d.dataset.opt = opt;
      opts.appendChild(d);
    });
  } else {
    $('tv-q-text').textContent = 'Đang tải câu hỏi...';
    $('tv-q-opts').innerHTML = '';
  }

  // Timer bar (30s)
  const fill = $('tv-q-fill');
  fill.style.transition = 'none';
  fill.style.width = '100%';
  let t = 30;
  setTimeout(()=>{
    fill.style.transition = `width ${t}s linear`;
    fill.style.width = '0%';
  }, 50);
  qTimerInt = setInterval(()=>{ t--; if(t<=0) clearInterval(qTimerInt); }, 1000);
}

/* ══════════════════════════════════
   REVEAL CORRECT ANSWER
══════════════════════════════════ */
function revealAnswer(qId, result){
  clearInterval(qTimerInt);
  const q = (typeof questions!=='undefined') ? questions.find(q=>q.id===qId) : null;
  if(!q) return;

  document.querySelectorAll('.q-opt-display').forEach(el=>{
    if(el.dataset.opt === q.correctAnswer){
      el.classList.add('correct');
    }
  });

  const msg = result === 'correct' ? '✅ Chính xác!' : '❌ Sai rồi!';
  showToast(msg, 2000);
}

/* ══════════════════════════════════
   RENDER SCOREBOARD
══════════════════════════════════ */
function renderScoreboard(){
  const c = $('tv-player-cards');
  if(!c) return;

  const n = gsState.total_players || 0;
  if(n === 0){ 
    c.innerHTML = '<div style="color:var(--text2);text-align:center;padding:20px;font-size:.9rem">Chờ bắt đầu...</div>'; 
    return; 
  }

  // Sắp xếp theo điểm
  const players = [];
  for(let i=1;i<=n;i++){
    if(playersData[i]?.name) players.push({...playersData[i]});
  }
  players.sort((a,b)=>b.score-a.score);

  const ranks = ['🥇','🥈','🥉','4','5','6'];
  const rankClass = ['r1','r2','r3','','',''];
  const cur = gsState.current_player;

  c.innerHTML = players.map((p,i)=>{
    const isActive = p.id === cur && gsState.started;
    const isOut    = (p.turns_left||0) === 0 && gsState.started;
    const isOffline= !p.online;
    const scoreChanged = prevScores[p.id] !== undefined && prevScores[p.id] !== p.score;
    if(scoreChanged) delete prevScores[p.id];

    return `<div class="p-card-tv ${isActive?'active-tv':''} ${isOut?'out-tv':''} ${isOffline&&!isActive?'offline-tv':''}">
      <div class="p-rank ${rankClass[i]||''}">${ranks[i]||i+1}</div>
      <div class="p-av-tv ${AVCLASS[p.id-1]}">${p.id}</div>
      <div class="p-info-tv">
        <div class="p-name-tv">
          ${p.name}
          ${isOut ? '<span class="eliminated-badge">Hết lượt</span>' : ''}
        </div>
        <div class="p-turns-tv">
          🎰 <span>${p.turns_left}</span> lượt còn lại
        </div>
      </div>
      <div class="p-score-tv ${scoreChanged?'bump':''}">${p.score}</div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════
   PHASE INDICATOR
══════════════════════════════════ */
function updatePhase(phase){
  const dot=$('phase-dot'), lbl=$('phase-lbl');
  dot.className='phase-dot';
  if(phase==='spinning'){ dot.classList.add('spinning'); lbl.textContent='Đang quay...'; }
  else if(phase==='answering'){ dot.classList.add('answering'); lbl.textContent='Đang trả lời'; }
  else if(phase==='idle'){ dot.classList.add('idle'); lbl.textContent='Sẵn sàng'; }
  else { lbl.textContent='Đang chờ'; }
}

/* ══════════════════════════════════
   SYNC PLAYERS RỒI SHOW GAME OVER
══════════════════════════════════ */
async function syncPlayersAndShowGameOver() {
  try {
    const { data: pd } = await db.from('players').select('*');
    if(pd) pd.forEach(p => { playersData[p.id] = p; });
  } catch(e) {
    console.warn('[TV] syncPlayersAndShowGameOver error:', e);
  }
  // Delay nhỏ để animation cuối cùng kết thúc trước
  setTimeout(() => showGameOver(), 800);
}

/* ══════════════════════════════════
   GAME OVER
══════════════════════════════════ */
function showGameOver(){
  const overlay = $('go-overlay');
  overlay.classList.add('show');

  const n = gsState.total_players || 0;
  const all = [];
  for(let i=1;i<=n;i++){ if(playersData[i]?.name) all.push({...playersData[i]}); }
  all.sort((a,b)=>{
    if(b.score!==a.score) return b.score-a.score;
    if(b.turns_left!==a.turns_left) return b.turns_left-a.turns_left;
    return (a.spin_count||0)-(b.spin_count||0);
  });

  const winner = all[0];
  if(winner){
    $('go-winner-box').innerHTML=`
      <div class="go-crown">👑</div>
      <div class="go-winner-name">${winner.name}</div>
      <div class="go-winner-score">Điểm số: <span>${winner.score}</span></div>`;
  }

  const medals=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
  $('go-ranking').innerHTML = all.map((p,i)=>`
    <div class="go-rank-item">
      <div class="go-rank-pos">${medals[i]||i+1}</div>
      <div class="go-rank-name">${p.name}</div>
      <div class="go-rank-score">${p.score}</div>
    </div>`).join('');
  
  showToast('🏁 TRÒ CHƠI KẾT THÚC!', 4000);
}

// Xử lý khi người dùng nhấn Escape để thoát
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && $('screen-display').classList.contains('active')){
    exitDisplay();
  }
});
</script>
