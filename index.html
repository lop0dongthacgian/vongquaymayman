<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>🎡 Vòng Quay May Mắn</title>
  <meta name="theme-color" content="#0d47a1">
  <meta name="apple-mobile-web-app-title" content="Vòng Quay May Mắn">
  <link rel="manifest" href="manifest.json">
  <script src="pwa-core.js"></script>
  <style>
    :root{--gold:#FFD700;--gold2:#FFA500;--red:#E63946;--green:#2DC653;--dark:#0D0D1A;--dark3:#1E1E38;--text:#F0F0FF;--text2:#A0A0C0;--border:rgba(255,215,0,.25);--glow:0 0 20px rgba(255,215,0,.35)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden}
    body{display:flex;align-items:center;justify-content:center;padding:20px}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse at 30% 40%,rgba(123,47,190,.12) 0%,transparent 60%),
                 radial-gradient(ellipse at 70% 70%,rgba(0,119,182,.12) 0%,transparent 60%)}
    .container{position:relative;z-index:1;text-align:center;max-width:420px;width:100%}
    .logo{font-size:50px;margin-bottom:6px;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    h1{font-size:1.5rem;font-weight:900;margin-bottom:4px;
      background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;background-clip:text}
    .subtitle{color:var(--text2);font-size:.78rem;margin-bottom:20px;line-height:1.4}

    .role-stack{display:flex;flex-direction:column;gap:10px}

    .role-btn{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:14px;
      border:2px solid transparent;cursor:pointer;transition:all .3s;text-decoration:none;
      color:var(--text);background:rgba(255,255,255,.05);text-align:left}
    .role-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .role-btn.admin-btn:hover{border-color:var(--gold);background:rgba(255,215,0,.06);box-shadow:0 0 20px rgba(255,215,0,.15)}
    .role-btn.player-btn:hover{border-color:var(--green);background:rgba(45,198,83,.06);box-shadow:0 0 20px rgba(45,198,83,.15)}

    .role-icon{font-size:36px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.06);border-radius:12px;flex-shrink:0}
    .role-info{flex:1;min-width:0}
    .role-name{font-weight:800;font-size:.95rem;margin-bottom:2px}
    .role-desc{font-size:.7rem;color:var(--text2);line-height:1.3}
    .role-arrow{font-size:1.2rem;color:var(--text2);flex-shrink:0;transition:transform .3s}
    .role-btn:hover .role-arrow{transform:translateX(4px)}
    .role-btn.player-btn:hover .role-arrow{color:var(--green)}
    .role-btn.admin-btn:hover .role-arrow{color:var(--gold)}

    .badge{display:inline-block;padding:2px 9px;border-radius:100px;font-size:.65rem;font-weight:700}
    .badge-admin{background:rgba(255,215,0,.12);color:var(--gold);border:1px solid rgba(255,215,0,.25)}
    .badge-player{background:rgba(45,198,83,.12);color:var(--green);border:1px solid rgba(45,198,83,.25)}

    .divider{display:flex;align-items:center;gap:10px;margin:2px 0}
    .divider-line{flex:1;height:1px;background:rgba(255,255,255,.08)}
    .divider-text{font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px}

    .footer{color:var(--text2);font-size:.68rem;margin-top:16px;opacity:.5}
    .footer a{color:var(--text2);text-decoration:none}

    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

    @media(max-width:380px){
      .role-btn{padding:14px 16px;gap:10px}
      .role-icon{font-size:30px;width:42px;height:42px}
      .role-name{font-size:.87rem}
      .role-desc{font-size:.67rem}
      .logo{font-size:40px}
      h1{font-size:1.3rem}
    }
    .footer a {
        color: lightblue; /* Màu xanh nhạt */
        text-decoration: none; /* Không gạch chân */
    }
    .footer a:active {
        color: deepskyblue; /* Màu xanh đậm khi nhấn */
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎡</div>
    <h1>Vòng Quay May Mắn</h1>
    <p class="subtitle">Trò chơi online đối kháng trực tiếp</p>
    
    <div class="role-stack">
      <!-- NGƯỜI CHƠI - TRÊN -->
      <a href="client.html" class="role-btn player-btn">
        <div class="role-icon">🎮</div>
        <div class="role-info">
          <div class="role-name">Người Chơi</div>
          <div class="role-desc">Tham gia trả lời câu hỏi & quay thưởng</div>
        </div>
        <span class="badge badge-player">MÁY CON</span>
        <span class="role-arrow">→</span>
      </a>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">hoặc</span>
        <div class="divider-line"></div>
      </div>

      <!-- QUẢN TRỊ - DƯỚI -->
      <a href="admin.html" class="role-btn admin-btn">
        <div class="role-icon">⚙️</div>
        <div class="role-info">
          <div class="role-name">Quản Trị</div>
          <div class="role-desc">Điều khiển trò chơi, cài đặt & quản lý</div>
        </div>
        <span class="badge badge-admin">MÁY CHỦ</span>
        <span class="role-arrow">→</span>
      </a>
    </div>
    
    <p class="footer">Liên hệ hỗ trợ <a href="mailto:anhthacgian@gmail.com">anhthacgian@gmail.com</a></p>
  </div>
  
</body>
</html>
